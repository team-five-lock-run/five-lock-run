name: CI/CD Deploy to EC2

# 트리거 조건 : dev 브랜치에 push 될 때 자동 실행
on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 레파지토리의 코드 체크아웃
      - name: Checkout source
        uses: actions/checkout@v4

      # jdk 17 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '17'

      # gradlew 권한 부여
      - name: Grant permission to gradlew
        run: chmod +x ./gradlew

      # Gradle 빌드 (테스트코드 제외)
      - name: Build with Gradle
        run: ./gradlew build -x test

      # JAR 파일을 ec2로 전송
      - name: Upload JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "./build/libs/*.jar"
          target: "~/five-lock-run"

      # GitHub Secrets기반으로 .env 생성
      - name: Create .env file from GitHub Secrets
        run: |
          printf "%s\n" "${{ secrets.ENV_FILE }}" > .env

      # 디버깅용 로그 (파일 생성 결과)
      - name: Debug - Check .env file
        run: |
          echo "[DEBUG] 파일 목록:"
          ls -al
          echo "[DEBUG] .env 파일 내용:"
          cat .env

      # 파일 압축
      - name: Compress deployment files
        run: tar -czf deploy.tar.gz Dockerfile docker-compose.yml .env

      # ec2로 압축 파일 전송
      - name: Upload docker & env files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "~/five-lock-run"

      # ec2에서 docker compose 실행
      - name: Run app on EC2 using docker-compose
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd ~/five-lock-run
            tar -xzf deploy.tar.gz
            docker-compose down
            docker-compose build
            docker-compose up -d
