name: CI/CD Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: Grant permission to gradlew
        run: chmod +x ./gradlew

      - name: Build jar using bootJar
        run: ./gradlew bootJar

      - name: Upload JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "./build/libs/*.jar"
          target: "~/five-lock-run"

      - name: Create .env file from GitHub Secrets
        run: |
          printf "%s\n" "${{ secrets.ENV_FILE }}" > .env

      - name: Upload docker & env files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: |
            "./Dockerfile"
            "./docker-compose.yml"
            "./.env"
          target: "~/five-lock-run"

      - name: Run app on EC2 using docker-compose
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd ~/five-lock-run
            docker-compose down
            docker-compose build
            docker-compose up -d
